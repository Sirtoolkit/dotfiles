[tools]
node = "lts"
uv = "latest"
rust = "latest"
python = "latest"
java = "17"
pnpm = "latest"
go = "latest"
firebase = "latest"
fluttergen = "latest"
worktrunk = "latest"
rtk = "latest"
github-cli = "latest"
atuin = "latest"
infisical = "latest"
carapace = "latest"
kubectl = "latest"
azure = "latest"
usage = "latest"
'github:can1357/oh-my-pi' = 'latest'

[tasks."wt:new"]
quiet = true
usage = '''
arg "<name>" help="Feature branch name suffix"
'''
run = 'wt switch --create "feat/${usage_name?}" --base=@'

[tasks."wt:remove"]
quiet = true
usage = '''
arg "<branch>" help="Branch/worktree to remove"
'''
run = 'wt remove -D "${usage_branch?}"'

[tasks."wt:remove_interactive"]
description = "Borrar worktree seleccionado"
quiet = true
run = """
  branch=$(wt list --format=json | jq -r '.[].branch' | fzf)
  if [ -n "$branch" ]; then
    wt remove -D "$branch"
  else
    echo "Cancelado: No se seleccionó ninguna rama."
  fi
"""

[tasks.krun]
description = "Run kanata keyboard remapper"
quiet = true
run = """
  if ! pgrep -x "Karabiner-VirtualHIDDevice-Daemon" > /dev/null 2>&1; then
    echo "Error: Karabiner-VirtualHIDDevice-Daemon no está corriendo. Ejecuta 'chezmoi apply' primero."
    exit 1
  fi
  sudo /usr/local/bin/kanata -c ~/.config/kanata/config.kbd > /dev/null &
  echo "✓ Kanata iniciado"
"""

[tasks.kkill]
description = "Kill kanata process"
quiet = true
run = """
  sudo pkill kanata
  echo "✓ Kanata detenido"
"""

[settings]
experimental = true
disable_hints = ["false"]
python.uv_venv_auto = true
idiomatic_version_file_enable_tools = []

