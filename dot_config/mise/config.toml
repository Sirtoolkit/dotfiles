[tasks."wt:new"]
quiet = true
run = "wt switch --create feat/{{arg(i=0)}} --base=@"

[tasks."wt:remove"]
quiet = true
run = "wt remove -D {{arg(i=0)}}"

[tasks.olc]
description = "Ollama Cloud - Seleccionar y guardar modelo desde el catálogo"
quiet = true
run = """
  cache_file="/tmp/ollama_cloud_list"
  usage_file="$HOME/.config/ollama/model_usage"
  sort_script="$HOME/.config/ollama/olc_sort.sh"

  if [ ! -f "$cache_file" ]; then
    echo "⏳ Descargando catálogo..."
    curl -s "https://ollama.com/api/tags" | jq -r '.models[].name' | sort > "$cache_file"
  fi

  selection=$(sh "$sort_script" "$cache_file" "$usage_file" | fzf --height 40% --layout=reverse --border \
    --header "☁️ Catálogo Cloud (Presiona Ctrl+R para actualizar)" \
    --bind "ctrl-r:reload(curl -s https://ollama.com/api/tags | jq -r '.models[].name' | sort > /tmp/ollama_cloud_list && sh $HOME/.config/ollama/olc_sort.sh /tmp/ollama_cloud_list $usage_file)" \
    )

  if [ -n "$selection" ]; then
    mkdir -p "$HOME/.config/ollama"
    if [ -f "$usage_file" ]; then
      awk -v m="$selection" '$1==m{$2++;found=1}{print}END{if(!found)print m,1}' "$usage_file" > "$usage_file.tmp" && mv "$usage_file.tmp" "$usage_file"
    else
      echo "$selection 1" > "$usage_file"
    fi
    full_model="${selection}:cloud"
    echo "✓ Modelo seleccionado: $full_model"
    echo "🚀 Lanzando claude con Ollama..."
    env ANTHROPIC_AUTH_TOKEN=ollama ANTHROPIC_BASE_URL=http://localhost:11434 claude --model "$full_model"
  fi
"""

[tasks."wt:remove_interactive"]
description = "Borrar worktree seleccionado"
quiet = true
run = """
  branch=$(wt list --format=json | jq -r '.[].branch' | fzf)
  if [ -n "$branch" ]; then
    wt remove -D "$branch"
  else
    echo "Cancelado: No se seleccionó ninguna rama."
  fi
"""

[tasks.krun]
description = "Run kanata keyboard remapper"
quiet = true
run = """
  if ! pgrep -x "Karabiner-VirtualHIDDevice-Daemon" > /dev/null 2>&1; then
    echo "Error: Karabiner-VirtualHIDDevice-Daemon no está corriendo. Ejecuta 'chezmoi apply' primero."
    exit 1
  fi
  sudo kanata -c ~/.config/kanata/config.kbd > /dev/null &
  echo "✓ Kanata iniciado"
"""

[tasks.kkill]
description = "Kill kanata process"
quiet = true
run = """
  sudo pkill kanata
  echo "✓ Kanata detenido"
"""

