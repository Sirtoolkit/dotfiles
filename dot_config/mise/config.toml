[tools]
node = "lts"
fluttergen = "latest"
terraform = "latest"
rust = "latest"
python = "latest"
java = "17"
pnpm = "latest"
dotnet = "latest"
go = "latest"
bun = "latest"
firebase = "latest"
amp = "latest"

[settings]
experimental = true
disable_hints = ["false"]
python.uv_venv_auto = true
idiomatic_version_file_enable_tools = []

[shell_alias]
zshconfig = "nvim ~/.zshrc"
ohmyzsh = "nvim ~/.oh-my-zsh"
v = "nvim"
zsource = 'source ~/.zshrc'

# Navigation
".." = "cd .."
"..." = "cd ../.."
"...." = "cd ../../.."

# Listing (eza)
ls = "eza -l --icons=always -m -n -l"
la = "eza -la --icons=always -m -n -l"
l = "eza -la --icons=always -m -n -l"
ll = "eza -l --icons=always -m -n -l"
lt = "eza --tree --icons=always"

mkdir = 'mkdir -pv'

firebase = "firebase-tools"

dbb = "flutter clean && dart run build_runner build -d"
dbw = "flutter clean && dart run build_runner watch -d"
mbf = "mason make feature_brick --project_name $(cat pubspec.yaml | awk 'NR==1 {print; exit}' | awk '{print $2}') --name"

cea = "npx create-expo-app@latest"
cea-blk = "npx create-expo-app@latest --template blank-typescript"

# Git shortcuts (shell aliases wrapping git)
g = "git"
gst = "git status"
gp = "git push"
gpl = "git pull"
gc = "git commit"
ga = "git add"
gco = "git checkout"
gb = "git branch"
glog = "git log --oneline --graph -10"
gs = "git switch"
gf = "git fetch"

# Search/Find
alias = "alias | grep"
grep = "grep --color=auto"

c = "clear"
t = "tmux"
ki = "kilo"

cha = 'chezmoi apply'
qc-lily = 'qmk compile -kb lily58 -km my_lily58'
qf-lily = 'qmk flash -kb lily58 -km my_lily58'
