[tasks."wt:new"]
run = "wt switch --create feat/{{arg(i=0)}} --base=@"

[tasks."wt:remove"]
run = "wt remove -D {{arg(i=0)}}"

[tasks.olc]
description = "Ollama Cloud - Seleccionar y lanzar modelo desde el catálogo"
run = """
  cache_file="/tmp/ollama_cloud_list"
  if [ ! -f "$cache_file" ]; then
    echo "⏳ Primera vez: Descargando catálogo..."
    for i in {1..5}; do
      curl -s -L -H "User-Agent: Mozilla/5.0" "https://ollama.com/search?c=cloud&page=$i"
    done | grep -oE '/library/[a-z0-9.-]+' | cut -d'/' -f3 | sort -u > "$cache_file"
  fi
  selection=$(fzf --height 40% --layout=reverse --border \
    --header "☁️ Catálogo Cloud (Presiona Ctrl+R para actualizar)" \
    --bind "ctrl-r:execute(rm $cache_file && echo 'Actualizando...' && for i in {1..5}; do curl -s -L -H 'User-Agent: Mozilla/5.0' 'https://ollama.com/search?c=cloud&page=\\$i'; done | grep -oE '/library/[a-z0-9.-]+' | cut -d'/' -f3 | sort -u > $cache_file)+reload(cat $cache_file)" \
    < "$cache_file")
  if [ -n "$selection" ]; then
    full_model="${selection}:cloud"
    echo "⚡ Lanzando: ollama launch claude --model $full_model"
    ollama launch claude --model "$full_model"
  fi
"""

[tasks."wt:remove_interactive"]
description = "Borrar worktree seleccionado"
run = """
  branch=$(wt list --format=json | jq -r '.[].branch' | fzf)
  if [ -n "$branch" ]; then
    wt remove -D "$branch"
  else
    echo "Cancelado: No se seleccionó ninguna rama."
  fi
"""

