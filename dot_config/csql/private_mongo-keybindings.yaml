global:
    closeApp:
        keys: [Ctrl+c]
        description: Close application
    toggleFullScreenHelp:
        runes: ['?']
        description: Toggle full screen help
    openConnection:
        keys: [Ctrl+o]
        description: Open connection page
    showStyleModal:
        keys: [Ctrl+t]
        description: Toggle style change modal
    toggleHeader:
        runes: [t]
        description: Expand/collapse header
    toggleReadOnly:
        keys: [Alt+w]
        description: Toggle read-only mode
    toggleTransaction:
        keys: [Alt+x]
        description: Toggle transaction (staged-changes) mode
    commitTransaction:
        keys: [Alt+c]
        description: Commit staged transaction
navigation:
    moveUp:
        keys: [Up]
        runes: [k]
        description: Move up
    moveDown:
        keys: [Down]
        runes: [j]
        description: Move down
    moveLeft:
        keys: [Left]
        runes: [h]
        description: Move left
    moveRight:
        keys: [Right]
        runes: [l]
        description: Move right
help:
    close:
        keys: [Esc]
        description: Close help
    search:
        runes: [/]
        description: Search keybindings
    editKey:
        runes: [e]
        description: Edit keybinding
connection:
    connectionForm:
        saveConnection:
            keys: [Ctrl+s]
            description: Save connection
        focusList:
            keys: [Ctrl+h, Ctrl+Left]
            description: Focus Connection List
    connectionList:
        focusForm:
            keys: [Ctrl+l, Ctrl+Right]
            description: Focus form
        deleteConnection:
            keys: [Ctrl+d]
            description: Delete connection
        editConnection:
            runes: [E]
            description: Edit connection
        setConnection:
            keys: [Enter, Space]
            description: Set connection
main:
    focusNext:
        keys: [Ctrl+l]
        description: Focus next component
    focusPrevious:
        keys: [Ctrl+h]
        description: Focus prev component
    nextView:
        keys: [Tab]
        description: Next view (Content/Aggregation/Indexes)
    previousView:
        keys: [Backtab]
        description: Prev view (Content/Aggregation/Indexes)
    closeTab:
        keys: [Ctrl+x]
        description: Close collection tab
    hideDatabases:
        keys: [Ctrl+n]
        runes: ['|']
        description: Hide databases
    openActions:
        keys: [Ctrl+Space]
        runes: [':']
        description: Actions
    showAIQuery:
        keys: [Alt+a]
        description: Show AI prompt
    showServerInfo:
        keys: [Alt+s]
        description: Show server info
databases:
    filterBar:
        runes: [/]
        description: Focus filter bar
    clearFilter:
        keys: [Ctrl+u]
        description: Clear filter
    expandAll:
        runes: [E]
        description: Expand all
    collapseAll:
        runes: [W]
        description: Collapse all
