onboarding = false
[keys]
prefix = "ctrl+a"
previous_workspace = "f8"
next_workspace = "f9"

previous_agent = "f10"
next_agent = "f11"

[[keys.command]]
key = "prefix+m"
type = "pane"
command = "mole"

[worktrees]
directory = "~/.cauce/worktrees"

[theme]
name = "gruvbox"

[ui]
mouse_capture = true
confirm_close = false
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = true
agent_panel_scope = "all"
redraw_on_focus_gained = false
reduced_motion = true
animations = false
max_render_fps = 30
background_render_fps = 5

[advanced]
scrollback_limit_bytes = 5000000

[experimental]
kitty_graphics = true

[ui.toast]
delivery = "system"
